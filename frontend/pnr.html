<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PNR Status — RailBook Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar" id="mainNav"></nav>
<div class="page">
  <div class="page-hdr"><h1>PNR Status 🔎</h1><p>Enter your 10-digit PNR to check booking status</p></div>

  <div class="pnr-box">
    <div id="msg" class="alert"></div>
    <div class="form-group">
      <label>PNR Number</label>
      <input type="text" id="pnrInput" placeholder="e.g. 4521839072" maxlength="10"
             style="font-family:'DM Mono',monospace;font-size:1.1rem;letter-spacing:2px;text-align:center"
             onkeydown="if(event.key==='Enter')checkPNR()">
    </div>
    <button class="btn btn-primary btn-block" onclick="checkPNR()" id="checkBtn">🔍 Check PNR Status</button>
  </div>

  <div id="pnrResult" style="margin-top:22px"></div>
</div>

<script src="utils.js"></script>
<script>
requireLogin();
renderNav('pnr');

// auto-fill PNR from URL
const urlPNR = new URLSearchParams(window.location.search).get('pnr');
if(urlPNR){ document.getElementById('pnrInput').value=urlPNR; checkPNR(); }

async function checkPNR(){
  const pnr = document.getElementById('pnrInput').value.trim();
  if(!pnr||pnr.length<8) return showAlert('msg','Please enter a valid PNR number');

  const btn = document.getElementById('checkBtn');
  btn.disabled=true; btn.textContent='Checking...';

  try{
    const d = await fetch(`${API}/pnr/${pnr}`).then(r=>r.json());
    btn.disabled=false; btn.textContent='🔍 Check PNR Status';

    if(!d.success){
      showAlert('msg', d.message);
      document.getElementById('pnrResult').innerHTML='';
      return;
    }

    const t   = d.ticket;
    const pax = d.passengers || [];
    const paxRows = pax.map(p=>`<tr>
      <td><strong>${p.name}</strong></td>
      <td>${p.age}</td>
      <td>${p.gender}</td>
      <td>${p.berth_pref}</td>
      <td><span style="font-family:'DM Mono',monospace;font-size:.8rem;color:var(--saffron)">${p.seat_no||'—'}</span></td>
      <td>${statusBadge(p.status)}</td>
    </tr>`).join('');

    document.getElementById('pnrResult').innerHTML=`
      <div class="ticket-card">
        <div class="tk-head">
          <div>
            <div class="pnr-lbl">PNR Number</div>
            <div class="pnr-num">${t.pnr}</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            ${typeBadge(t.train_type)}
            ${statusBadge(t.booking_status)}
            ${statusBadge(t.payment_status)}
          </div>
        </div>
        <div class="tk-body">
          <div style="font-size:.78rem;color:var(--text3);margin-bottom:10px;font-weight:600">#${t.train_number} — ${t.train_name}</div>
          <div class="tk-route">
            <div class="tk-st">
              <div class="tk-time">${formatTime(t.departure)}</div>
              <div class="tk-city">${t.source}</div>
            </div>
            <div style="flex:1;text-align:center;font-size:1.2rem;color:var(--blue)">──🚂──→</div>
            <div class="tk-st" style="text-align:right">
              <div class="tk-time">${formatTime(t.arrival)}</div>
              <div class="tk-city">${t.destination}</div>
            </div>
          </div>
          <div class="tk-meta">
            <span>📅 Journey Date: <strong>${formatDate(t.journey_date)}</strong></span>
            <span>🎟 Class: <strong>${t.class_code}</strong></span>
            <span>👤 Booked by: <strong>${t.passenger_name}</strong></span>
            <span>💰 Fare: <strong style="color:var(--green)">₹${Number(t.total_fare).toLocaleString('en-IN')}</strong></span>
          </div>

          <div style="margin-top:14px">
            <div style="font-size:.72rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Passenger Details (${pax.length})</div>
            <table class="pax-table">
              <thead><tr><th>Name</th><th>Age</th><th>Gender</th><th>Berth Pref</th><th>Seat No</th><th>Status</th></tr></thead>
              <tbody>${paxRows||'<tr><td colspan="6" style="text-align:center;color:var(--text3)">No passengers found</td></tr>'}</tbody>
            </table>
          </div>
        </div>
      </div>`;
  } catch(e){
    btn.disabled=false; btn.textContent='🔍 Check PNR Status';
    showAlert('msg','Could not connect. Is server running?');
  }
}
</script>
</body>
</html>
