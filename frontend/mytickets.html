<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Tickets — RailBook Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar" id="mainNav"></nav>
<div class="page">
  <div class="page-hdr">
    <h1>My Tickets 📋</h1>
    <p>All your bookings — confirmed, cancelled and waitlisted</p>
  </div>

  <div id="msg" class="alert"></div>

  <div class="tabs">
    <button class="tab-btn active" onclick="filterTab('all',this)">All Bookings</button>
    <button class="tab-btn" onclick="filterTab('Confirmed',this)">Confirmed</button>
    <button class="tab-btn" onclick="filterTab('Cancelled',this)">Cancelled</button>
    <button class="tab-btn" onclick="filterTab('Waitlist',this)">Waitlist</button>
  </div>

  <div id="ticketsArea"><div class="loader">Loading your tickets</div></div>
</div>

<script src="utils.js"></script>
<script>
const user = requireLogin();
renderNav('mytickets');

let allTickets = [];

async function loadTickets(){
  try{
    const d = await fetch(`${API}/my-tickets/${user.id}`).then(r=>r.json());
    allTickets = d.tickets || [];
    renderTickets(allTickets);
  } catch(e){
    document.getElementById('ticketsArea').innerHTML='<div class="empty"><div class="ei">⚠️</div><p>Could not load tickets. Is server running?</p></div>';
  }
}

function filterTab(status, btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = status==='all' ? allTickets : allTickets.filter(t=>t.booking_status===status);
  renderTickets(filtered);
}

function renderTickets(tickets){
  const el = document.getElementById('ticketsArea');
  if(!tickets.length){
    el.innerHTML=`<div class="empty"><div class="ei">🎫</div><p>No tickets found in this category. <a href="trains.html" style="color:var(--blue)">Book a ticket →</a></p></div>`;
    return;
  }
  el.innerHTML = tickets.map(t=>renderTicketCard(t)).join('');
}

function renderTicketCard(t){
  const pax = t.passengers || [];
  const isCancellable = t.booking_status==='Confirmed';
  const paxRows = pax.map(p=>`<tr>
    <td><strong>${p.name}</strong></td>
    <td>${p.age}</td>
    <td>${p.gender}</td>
    <td>${p.berth_pref}</td>
    <td><span style="font-family:'DM Mono',monospace;font-size:.78rem;color:var(--saffron)">${p.seat_no||'—'}</span></td>
    <td>${statusBadge(p.status)}</td>
  </tr>`).join('');

  return `<div class="ticket-card">
    <div class="tk-head">
      <div>
        <div class="pnr-lbl">PNR Number</div>
        <div class="pnr-num">${t.pnr}</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        ${typeBadge(t.train_type)}
        ${statusBadge(t.booking_status)}
        ${statusBadge(t.payment_status)}
        ${isCancellable
          ? `<button class="btn btn-red btn-sm" onclick="cancelTicket(${t.id})">Cancel</button>`
          : ''}
      </div>
    </div>
    <div class="tk-body">
      <div style="font-size:.78rem;color:var(--text3);margin-bottom:8px;font-weight:600">${t.train_number} — ${t.train_name}</div>
      <div class="tk-route">
        <div class="tk-st">
          <div class="tk-time">${formatTime(t.departure)}</div>
          <div class="tk-city">${t.source}</div>
        </div>
        <div class="tk-arrow" style="flex:1;text-align:center">───✈───</div>
        <div class="tk-st" style="text-align:right">
          <div class="tk-time">${formatTime(t.arrival)}</div>
          <div class="tk-city">${t.destination}</div>
        </div>
      </div>
      <div class="tk-meta">
        <span>📅 Journey: <strong>${formatDate(t.journey_date)}</strong></span>
        <span>🎟 Class: <strong>${t.class_code}</strong></span>
        <span>👥 Passengers: <strong>${pax.length}</strong></span>
        <span>💰 Total Fare: <strong style="color:var(--green)">₹${Number(t.total_fare).toLocaleString('en-IN')}</strong></span>
        <span>🕐 Booked: <strong>${formatDate(t.booked_at)}</strong></span>
      </div>

      <!-- Passenger Details -->
      <div style="margin-top:14px">
        <div style="font-size:.72rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Passenger Details</div>
        <table class="pax-table">
          <thead><tr><th>Name</th><th>Age</th><th>Gender</th><th>Berth</th><th>Seat No</th><th>Status</th></tr></thead>
          <tbody>${paxRows || '<tr><td colspan="6" style="color:var(--text3);text-align:center">No passenger data</td></tr>'}</tbody>
        </table>
      </div>
    </div>
  </div>`;
}

async function cancelTicket(ticketId){
  if(!confirm('Are you sure you want to cancel this ticket?\nRefund will be processed in 5–7 business days.')) return;
  try{
    const d = await fetch(`${API}/cancel-ticket`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ticket_id:ticketId, user_id:user.id})
    }).then(r=>r.json());

    if(d.success){
      showAlert('msg', '✅ '+d.message, 'success');
      loadTickets();
    } else {
      showAlert('msg', d.message);
    }
  } catch(e){ showAlert('msg','Cancellation failed. Check server.'); }
}

loadTickets();
</script>
</body>
</html>
